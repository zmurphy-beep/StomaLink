functionsDirectory = "/opt/build/repo/netlify/functions"
functionsDirectoryOrigin = "default"
headersOrigin = "config"
redirectsOrigin = "config"
plugins = []

[build]
publish = "."
publishOrigin = "config"
commandOrigin = "config"
command = ""
functions = "/opt/build/repo/netlify/functions"

  [build.environment]

  [build.processing]

    [build.processing.css]

    [build.processing.html]

    [build.processing.images]

    [build.processing.js]

  [build.services]

[functions]

  [functions."*"]

[[headers]]
for = "/*"

  [headers.values]
  X-Frame-Options = "DENY"
  X-XSS-Protection = "1; mode=block"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "camera=(), microphone=(), geolocation=()"
  Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;img-src 'self' data: blob: https://*.supabase.co;connect-src 'self' https://*.supabase.co wss://*.supabase.co https://formspree.io;

[[headers]]
for = "/sw.js"

  [headers.values]
  Cache-Control = "no-cache, no-store, must-revalidate"
  Service-Worker-Allowed = "/"

[[headers]]
for = "/manifest.json"

  [headers.values]
  Cache-Control = "public, max-age=86400"
  Content-Type = "application/manifest+json"

[[headers]]
for = "/auth.bundle.js"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.css"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/index.html"

  [headers.values]
  Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
for = "/*.png"

  [headers.values]
  Cache-Control = "public, max-age=604800"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
force = false

  [redirects.query]

  [redirects.conditions]

  [redirects.headers]